server.address=127.0.0.1
server.port=8080

spring.application.name=next-dent-api

# 1. Credenciales de la Base de Datos (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/next_dent
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Configuracion de Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Mantenemos 'update' para que Hibernate cree las tablas automaticamente
spring.jpa.hibernate.ddl-auto=update

# 3. Mostrar el SQL en la consola (util para debugear)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. JWT
app.jwt.secret=nextdent_clave_secreta_minimo_32_caracteres_aqui
app.jwt.expiration-ms=86400000

# 5. Security debug
logging.level.org.springframework.security=WARN

# CORS local (el perfil prod sobreescribe esto con variable de entorno)
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://127.0.0.1:5173,http://127.0.0.1:5174
